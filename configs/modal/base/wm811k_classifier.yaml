task_mode: binary

train:
  epochs: 20
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 0.0
  log_interval: 100
  norm_scale: 2.0
  optimizer: adamw
  scheduler: cosine
  loss_type: ce

data:
  dataset_name: wm811k
  batch_size: 64
  num_workers: 4
  pin_memory: true
  augment:
    random_flip: true
    random_rotate90: true
