# Smooth Class-Balanced Sampler + Class-Aware Augmentation + Focal Loss.
#
# Key differences from cb_sampler_focal_multiclass:
# 1. sampler_alpha < 1.0: smooth resampling — partially rebalances without
#    over-repeating Near-full (54 samples).
# 2. class_aware augmentation: minority classes get stronger spatial transforms
#    (translate, scale) and random erasing; majority classes get normal augmentation.
train:
  weight_decay: 1.0e-3
  grad_clip: 1.0
  loss_type: focal
  focal_gamma: 1.5

data:
  sampler: class_balanced
  sampler_alpha: 0.75
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
    # ── Class-aware augmentation (minority gets stronger transforms) ──
    class_aware: true
    minority_classes: ["Donut", "Near-full", "Random", "Scratch", "Loc"]
    minority_translate_frac: 0.12
    minority_scale_min: 0.90
    minority_scale_max: 1.10
    minority_erasing_p: 0.3
