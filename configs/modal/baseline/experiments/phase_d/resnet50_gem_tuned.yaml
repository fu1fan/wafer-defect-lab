# Phase D: Final optimized model - ResNet50 + GeM + B2 best params
# Combines: GeM pooling (best structure from Phase C) + lr=5e-4, gamma=1.5 (best params from Phase B)
_base_:
  - ../../../base/wm811k_classifier.yaml
  - ../../models/resnet50_gem.yaml
  - ../../recipes/cb_sampler_focal_multiclass.yaml

task_mode: multiclass

train:
  epochs: 25
  lr: 5.0e-4
  focal_gamma: 1.5

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
