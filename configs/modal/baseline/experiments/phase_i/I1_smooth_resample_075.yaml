# Phase I: Data-level improvements for minority classes
# Experiment I1 - Smooth resampling only (alpha=0.75)
# Tests whether reducing oversampling intensity improves generalization
# while keeping the standard augmentation unchanged.
_base_:
  - ../../../base/wm811k_classifier.yaml
  - ../../models/resnet50_gem.yaml
  - ../../recipes/cb_sampler_focal_multiclass.yaml

task_mode: multiclass

train:
  epochs: 25
  lr: 5.0e-4
  focal_gamma: 1.5

data:
  sampler_alpha: 0.75
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
