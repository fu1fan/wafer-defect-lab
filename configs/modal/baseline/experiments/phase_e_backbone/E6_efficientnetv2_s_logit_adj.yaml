# E6: EfficientNetV2-S + CB sampler + Logit Adjustment
# Test if Logit Adjustment helps EfficientNetV2 on long-tail classes
_base_:
  - ../../../base/wm811k_classifier.yaml
  - ../../models/efficientnetv2_s.yaml
  - ../../recipes/cb_sampler_logit_adj_multiclass.yaml

task_mode: multiclass

train:
  epochs: 5
  lr: 5.0e-4

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
