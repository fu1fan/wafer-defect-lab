# E8: ConvNeXt-Tiny + CB sampler + LDAM Loss
# Test margin-based loss on the strongest backbone candidate
_base_:
  - ../../../base/wm811k_classifier.yaml
  - ../../models/convnext_tiny.yaml
  - ../../recipes/cb_sampler_ldam_multiclass.yaml

task_mode: multiclass

train:
  epochs: 5
  lr: 5.0e-4

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
