# E1: ConvNeXt-Tiny + CB sampler + focal (γ=1.5)
# Baseline comparison: same training recipe as D1 (best ResNet50), new backbone
_base_:
  - ../../../base/wm811k_classifier.yaml
  - ../../models/convnext_tiny.yaml
  - ../../recipes/cb_sampler_focal_multiclass.yaml

task_mode: multiclass

train:
  epochs: 5
  lr: 5.0e-4
  focal_gamma: 1.5

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
