# v3 Experiment: v2 + max_samples_per_class cap for "none" domination
#
# v2 showed: best avg_acc (0.451) and macro_acc (0.287), but high forgetting
# (0.663) because task 2's "none" class (36730 samples) overwhelms replay
# (4463 samples = only 10.5% of total).
#
# Fix: cap any single class to 5000 samples during training.
# With cap, task 2 becomes: none(5000) + Random(609) + Scratch(500) = 6109
# Plus replay = 4463. Total = 10572. Replay = 42% of total.
# This makes replay strong enough to maintain previous knowledge.
#
# All other settings identical to v2 (proven best combination):
# - Defects-first curriculum
# - NO CMS slow freeze (full plasticity)
# - sqrt_inv_freq class weights only (no balanced sampling)
# - 1000 exemplars per class replay
# - Best checkpoint loading after each task
# - 15 epochs

_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/nested_selfmod.yaml
  - ../recipes/nested_continual.yaml

task_mode: multiclass

train:
  epochs: 15
  lr: 5.0e-4
  weight_decay: 1.0e-3
  grad_clip: 1.0

continual:
  num_tasks: 3
  classes_per_task: 3
  eval_after_each_task: true
  freeze_slow_cms: false
  class_weight_per_task: true
  class_weight_mode: sqrt_inv_freq
  balanced_sampling: false
  max_samples_per_class: 5000
  epochs_per_task: [15, 15, 15]
  task_order:
    - [1, 2, 3]     # Center, Donut, Edge-Loc
    - [4, 5, 6]     # Edge-Ring, Loc, Near-full
    - [7, 8, 0]     # Random, Scratch, none
  replay:
    enabled: true
    exemplars_per_class: 1000
