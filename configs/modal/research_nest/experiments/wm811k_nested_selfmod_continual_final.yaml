# FINAL Experiment: Best combination for continual nested_selfmod
#
# Key design decisions based on experiments A/B/C:
# - ExpA: no freeze gives BEST per-task acquisition (89-95%)
# - ExpB: replay essential for anti-forgetting, but inv_freq class weights too aggressive
# - ExpC: CMS freeze limits acquisition of new tasks
#
# This experiment combines:
# 1. Defects-first curriculum (proven to enable acquisition)
# 2. NO CMS slow freeze (allows full plasticity for new tasks)
# 3. Replay with 300 exemplars per class (compensates for no-freeze forgetting)
# 4. sqrt-inverse-frequency class weights (moderate, not extreme)
# 5. Balanced sampling (handle within-task imbalance)
# 6. 15 epochs per task (adequate budget)
#
# Usage:
#   python scripts/train_continual.py \
#       --config configs/modal/research_nest/experiments/wm811k_nested_selfmod_continual_final.yaml

_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/nested_selfmod.yaml
  - ../recipes/nested_continual.yaml

task_mode: multiclass

train:
  epochs: 15
  lr: 5.0e-4
  weight_decay: 1.0e-3
  grad_clip: 1.0

continual:
  num_tasks: 3
  classes_per_task: 3
  eval_after_each_task: true
  freeze_slow_cms: false
  class_weight_per_task: true
  class_weight_mode: sqrt_inv_freq
  balanced_sampling: true
  epochs_per_task: [15, 15, 15]
  task_order:
    - [1, 2, 3]     # Center, Donut, Edge-Loc
    - [4, 5, 6]     # Edge-Ring, Loc, Near-full
    - [7, 8, 0]     # Random, Scratch, none
  replay:
    enabled: true
    exemplars_per_class: 300
