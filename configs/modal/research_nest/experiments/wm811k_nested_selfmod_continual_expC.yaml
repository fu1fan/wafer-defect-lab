# Experiment C: Refined continual learning
#
# Combines best insights from ExpA (curriculum + acquisition) and ExpB (replay):
# 1. Defects-first curriculum (proven to enable acquisition)
# 2. Balanced sampling ONLY (no class weights — avoid compounded correction)
# 3. Replay with 300 exemplars per class (more replay budget)
# 4. CMS slow freeze (proven to help retention)
# 5. 15 epochs per task (more budget for learning with replay data)
# 6. Teach signal warmup 2 epochs (let model settle before CMS inner updates)
#
# Hypothesis: balanced sampling alone (without class weights) will correctly
# handle the "none" class without suppressing it, while replay provides
# anti-forgetting coverage.
#
# Usage:
#   python scripts/train_continual.py \
#       --config configs/modal/research_nest/experiments/wm811k_nested_selfmod_continual_expC.yaml

_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/nested_selfmod.yaml
  - ../recipes/nested_continual.yaml

task_mode: multiclass

train:
  epochs: 15
  lr: 5.0e-4
  weight_decay: 1.0e-3
  grad_clip: 1.0

continual:
  num_tasks: 3
  classes_per_task: 3
  eval_after_each_task: true
  freeze_slow_cms: true
  class_weight_per_task: false
  balanced_sampling: true
  epochs_per_task: [15, 15, 15]
  task_order:
    - [1, 2, 3]     # Center, Donut, Edge-Loc
    - [4, 5, 6]     # Edge-Ring, Loc, Near-full
    - [7, 8, 0]     # Random, Scratch, none
  replay:
    enabled: true
    exemplars_per_class: 300
