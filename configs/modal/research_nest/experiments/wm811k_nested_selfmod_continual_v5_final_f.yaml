# v5_final_f: Replay-only KD on task 1 only, skip task 2
#
# Key insight from experiments:
#   - KD excels at preserving task 0 during task 1 (retention 0.764 vs v4's 0.222)
#   - BUT KD prevents `none` from being learned in task 2 (none=0.000)
#   - `none` dominates test set (93%), so killing it tanks macro accuracy
#
# Strategy: Use KD ONLY for task 1 (preserving task 0 knowledge), then
# let task 2 run freely without KD (like v4) to learn `none` properly.
#
# Expected: Better task 0 retention from task 1-KD, plus good task 2
# learning from unconstrained CE, giving best of both worlds.
#
# lambda=1.0 additive, masked to old-class logits, replay-only, skip task 2

_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/nested_selfmod.yaml
  - ../recipes/nested_continual.yaml

task_mode: multiclass

train:
  epochs: 15
  lr: 5.0e-4
  weight_decay: 1.0e-3
  grad_clip: 1.0

continual:
  num_tasks: 3
  classes_per_task: 3
  eval_after_each_task: true
  freeze_slow_cms: false
  class_weight_per_task: true
  class_weight_mode: sqrt_inv_freq
  balanced_sampling: false
  max_samples_per_class: 5000
  epochs_per_task: [15, 15, 15]
  load_best_final: false
  task_order:
    - [1, 2, 3]     # Center, Donut, Edge-Loc
    - [4, 5, 6]     # Edge-Ring, Loc, Near-full
    - [7, 8, 0]     # Random, Scratch, none

  replay:
    enabled: true
    exemplars_per_class: 1000

  knowledge_distillation:
    enabled: true
    lambda: 1.0
    temperature: 2.0
    replay_only: true
    skip_tasks: [2]
