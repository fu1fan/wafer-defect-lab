# v5e: Masked KD (alpha=0.5) + WA + no best.pt
#
# The key fix from v5a-v5c: use MASKED KD (only distill old-class logits).
# Vanilla LwF distills all logits including new-class neurons where the
# teacher outputs noise. Masked KD (iCaRL/LUCIR-style) focuses on
# preserving old-class decision boundaries only.
#
# alpha=0.5: equal weight for CE and masked KD.
# WA: post-task bias correction.
# No best.pt: avoids selecting none-dominated checkpoint.

_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/nested_selfmod.yaml
  - ../recipes/nested_continual.yaml

task_mode: multiclass

train:
  epochs: 5
  lr: 5.0e-4
  weight_decay: 1.0e-3
  grad_clip: 1.0

continual:
  num_tasks: 3
  classes_per_task: 3
  eval_after_each_task: true
  freeze_slow_cms: false
  class_weight_per_task: true
  class_weight_mode: sqrt_inv_freq
  balanced_sampling: false
  max_samples_per_class: 5000
  epochs_per_task: [5, 5, 5]
  load_best_final: false
  task_order:
    - [1, 2, 3]     # Center, Donut, Edge-Loc
    - [4, 5, 6]     # Edge-Ring, Loc, Near-full
    - [7, 8, 0]     # Random, Scratch, none

  replay:
    enabled: true
    exemplars_per_class: 1000

  knowledge_distillation:
    enabled: true
    alpha: 0.5
    temperature: 2.0

  weight_alignment:
    enabled: true
