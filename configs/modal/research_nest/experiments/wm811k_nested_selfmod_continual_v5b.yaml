# v5b: v4 + Strong LwF KD + Weight Alignment
#
# Literature: LwF (Li & Hoiem 2017), DER (Yan et al. 2021)
#
# Hypothesis: moderate KD (alpha=0.5) may still allow too much drift.
# Stronger KD (alpha=0.3, i.e. 70% KD weight) plus higher T=3.0 should
# better preserve old-class decision boundaries at the cost of slightly
# slower new-class acquisition.
#
# KD: alpha=0.3 (30% CE + 70% KD), T=3.0 (softer targets)
# WA: enabled

_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/nested_selfmod.yaml
  - ../recipes/nested_continual.yaml

task_mode: multiclass

train:
  epochs: 5
  lr: 5.0e-4
  weight_decay: 1.0e-3
  grad_clip: 1.0

continual:
  num_tasks: 3
  classes_per_task: 3
  eval_after_each_task: true
  freeze_slow_cms: false
  class_weight_per_task: true
  class_weight_mode: sqrt_inv_freq
  balanced_sampling: false
  max_samples_per_class: 5000
  epochs_per_task: [5, 5, 5]
  task_order:
    - [1, 2, 3]     # Center, Donut, Edge-Loc
    - [4, 5, 6]     # Edge-Ring, Loc, Near-full
    - [7, 8, 0]     # Random, Scratch, none

  replay:
    enabled: true
    exemplars_per_class: 1000

  knowledge_distillation:
    enabled: true
    alpha: 0.3
    temperature: 3.0

  weight_alignment:
    enabled: true
