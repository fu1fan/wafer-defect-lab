# Phase I-ViT I4: CAFormer-S18 + global random erasing p=0.3 (alpha=1.0)
# Mirrors resnet50 Phase I I4
_base_:
  - ../../../base/wm811k_classifier.yaml
  - ../../models/caformer_s18.yaml
  - ../../recipes/cb_focal_vit.yaml

task_mode: multiclass

train:
  epochs: 10
  lr: 1.0e-4
  scheduler: cosine_warmup
  scheduler_args:
    warmup_epochs: 2

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
    random_erasing_p: 0.3
