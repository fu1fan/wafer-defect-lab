# Phase C1: CAFormer-S18 with lower LR + warmup to prevent overfitting
# B3 showed best val at epoch 1 then overfitting — needs gentler fine-tuning
_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/caformer_s18.yaml
  - ../recipes/cb_focal_vit.yaml

task_mode: multiclass

train:
  epochs: 10
  lr: 1.0e-4
  scheduler: cosine_warmup
  scheduler_args:
    warmup_epochs: 2

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
