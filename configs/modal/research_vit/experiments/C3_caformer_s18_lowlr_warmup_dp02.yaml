# Phase C3: CAFormer-S18 with higher drop path rate for regularization
# Test if stronger stochastic depth + lower LR prevents overfitting better
_base_:
  - ../../base/wm811k_classifier.yaml
  - ../recipes/cb_focal_vit.yaml

task_mode: multiclass

model:
  arch: caformer_s18_wafer
  in_channels: 1
  pretrained: true
  dropout: 0.3
  drop_path_rate: 0.2

train:
  epochs: 10
  lr: 1.0e-4
  scheduler: cosine_warmup
  scheduler_args:
    warmup_epochs: 2

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
