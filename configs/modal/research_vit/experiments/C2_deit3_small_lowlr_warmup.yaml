# Phase C2: DeiT3-S/16 with lower LR + warmup
# B1 showed weak minority class recall — try gentler training recipe
_base_:
  - ../../base/wm811k_classifier.yaml
  - ../models/deit3_small.yaml
  - ../recipes/cb_focal_vit.yaml

task_mode: multiclass

train:
  epochs: 10
  lr: 1.0e-4
  scheduler: cosine_warmup
  scheduler_args:
    warmup_epochs: 2

data:
  augment:
    random_flip: true
    random_rotate90: true
    random_translate_frac: 0.08
    random_scale_min: 0.95
    random_scale_max: 1.05
