# ── WM-811K training config ───────────────────────────────────────────
# Unified config for WM-811K experiments.
#
# Sections:
#   task_mode / model / train / data  – classifier training (train_classifier.py)
#   anomaly_dataloader                – anomaly-detection dataloaders (future use)
#
# Task modes:
#   binary     – normal (0) vs abnormal (1)
#   multiclass – 9-class failure-type pattern classification
# ─────────────────────────────────────────────────────────────────────

task_mode: binary   # binary | multiclass

model:
  arch: resnet18       # resnet18 | resnet34 | resnet50 (extensible via registry)
  in_channels: 1       # 1 = single-channel wafer map; 3 = channel-replicated
  pretrained: false     # ImageNet init (set in_channels=3 to get full benefit)
  dropout: 0.2

train:
  epochs: 20
  lr: 1.0e-3
  weight_decay: 1.0e-4
  grad_clip: 0.0
  log_interval: 100
  norm_scale: 2.0       # input normalization: x / norm_scale ({0,1,2} -> [0,1])

  # Optimizer selection (extensible via registry)
  optimizer: adamw      # adamw | sgd
  # optimizer_args:     # extra kwargs forwarded to the optimizer builder
  #   momentum: 0.9     # (sgd only)

  # LR scheduler selection (extensible via registry)
  scheduler: cosine     # cosine | step | none
  # scheduler_args:     # extra kwargs forwarded to the scheduler builder
  #   step_size: 10     # (step only)
  #   gamma: 0.1        # (step only)

  # class_weights: [0.15, 1.0]  # uncomment to handle imbalance in binary mode

data:
  batch_size: 64
  num_workers: 4
  pin_memory: true

  # Augmentation flags – only spatial transforms that preserve wafer-map
  # semantics.  No color jitter, random crop, or continuous-intensity ops.
  augment:
    random_flip: true       # horizontal + vertical
    random_rotate90: true   # 0 / 90 / 180 / 270 degrees


# ── Anomaly-detection dataloader config ──────────────────────────────
# Used by future anomaly-detection pipelines (PaDiM, PatchCore, etc.).
# Not consumed by train_classifier.py.
# ─────────────────────────────────────────────────────────────────────

anomaly_dataloader:
  dataset_name: wm811k

  loaders:
    train:
      # Use labeled normal wafers only for the first anomaly-detection baseline.
      subset: labeled
      filters:
        is_normal: true
      batch_size: 64
      shuffle: true
      num_workers: 4
      pin_memory: true
      drop_last: true
      return_masks: true
      return_float: true
      include_metadata: false

    eval:
      # Evaluate on the full labeled set: normal + abnormal.
      subset: labeled
      batch_size: 64
      shuffle: false
      num_workers: 4
      pin_memory: true
      drop_last: false
      return_masks: true
      return_float: true
      include_metadata: true
