dataset_name: wm811k

loaders:
  train:
    # Use labeled normal wafers only for the first anomaly-detection baseline.
    subset: labeled
    filters:
      is_normal: true
    batch_size: 64
    shuffle: true
    num_workers: 4
    pin_memory: true
    drop_last: true
    return_masks: true
    return_float: true
    include_metadata: false

  eval:
    # Evaluate on the full labeled set: normal + abnormal.
    subset: labeled
    batch_size: 64
    shuffle: false
    num_workers: 4
    pin_memory: true
    drop_last: false
    return_masks: true
    return_float: true
    include_metadata: true
